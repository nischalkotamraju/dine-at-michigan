name: Scrape Dining Menus

on:
  schedule:
    # Runs at 1am, 7am, 1pm, 7pm Eastern (UTC-4 in summer)
    - cron: '0 5,11,17,23 * * *'
  workflow_dispatch:

jobs:
  scrape:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Install Playwright and dependencies
        run: |
          mkdir -p /tmp/scraper
          cp scripts/scrape-menus.mjs /tmp/scraper/
          cd /tmp/scraper && npm init -y && npm install playwright
          npx --prefix /tmp/scraper playwright install chromium --with-deps

      - name: Scrape all dining halls (6 dates)
        env:
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
        run: node /tmp/scraper/scrape-menus.mjs
