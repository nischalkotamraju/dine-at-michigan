name: Scrape Dining Menus

on:
  schedule:
    # Runs at 1am, 7am, 1pm, 7pm Eastern (UTC-4 in summer)
    - cron: '0 5,11,17,23 * * *'
  workflow_dispatch:

jobs:
  scrape:
    runs-on: ubuntu-latest
    steps:
      - name: Scrape all dates (2 days back, today, 3 days forward)
        run: |
          WORKER_URL="https://michigan-dining-scraper.michigan-dining.workers.dev"
          for offset in -2 -1 0 1 2 3; do
            DATE=$(date -u -d "$offset days" '+%Y-%m-%d')
            echo "=== Triggering scrape for $DATE ==="
            # Fire and forget — don't wait for response (worker can take >30s)
            curl -s --max-time 10 "$WORKER_URL/?date=$DATE" > /dev/null 2>&1 &
            sleep 35
          done
          wait
          echo "All scrape jobs triggered"
