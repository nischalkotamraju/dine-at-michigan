name: Scrape Dining Menus

on:
  schedule:
    # Runs at 1am, 7am, 1pm, 7pm Eastern (UTC-4 in summer)
    - cron: '0 5,11,17,23 * * *'
  workflow_dispatch:

jobs:
  scrape:
    runs-on: ubuntu-latest
    steps:
      - name: Scrape all dates (3 passes to catch ScraperAPI failures)
        run: |
          WORKER_URL="https://michigan-dining-scraper.michigan-dining.workers.dev"

          for PASS in 1 2 3; do
            echo "=== Pass $PASS ==="
            for offset in -2 -1 0 1 2 3; do
              DATE=$(date -u -d "$offset days" '+%Y-%m-%d')
              echo "  Scraping $DATE..."
              curl -s --max-time 55 "$WORKER_URL/?date=$DATE" > /dev/null 2>&1
              sleep 8
            done
            echo "  Pass $PASS done, waiting before next pass..."
            sleep 30
          done

          echo "All passes complete!"
