name: Scrape Dining Menus

on:
  schedule:
    # Runs at 1am, 7am, 1pm, 7pm Eastern (UTC-4 in summer)
    - cron: '0 5,11,17,23 * * *'
  workflow_dispatch:

jobs:
  scrape:
    runs-on: ubuntu-latest
    steps:
      - name: Scrape all dates (2 days back, today, 3 days forward)
        run: |
          WORKER_URL="https://michigan-dining-scraper.michigan-dining.workers.dev"
          for offset in -2 -1 0 1 2 3; do
            DATE=$(date -u -d "$offset days" '+%Y-%m-%d')
            echo "=== Scraping $DATE ==="
            curl -s "$WORKER_URL/?date=$DATE" | python3 -c "
          import sys, json
          data = json.load(sys.stdin)
          for r in data.get('results', []):
              print(f\"  {r.get('hall','?')}: {r.get('result','?')}\")
          "
            echo ""
            sleep 5
          done
